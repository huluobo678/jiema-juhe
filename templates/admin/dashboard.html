<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 概况</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="admin-layout">
    <div class="sidebar">{% include 'admin/_sidebar.html' %}</div>
    <div class="main-content">
        {% block content %}
        <h3>概况</h3>
        <p style="color:var(--text-muted);margin-bottom:24px">欢迎回来，{{ session.admin_username }}</p>

        <div class="stat-grid">
            <div class="stat-card" style="border-left:4px solid var(--primary)">
                <div class="label">渠道数</div>
                <div class="value" style="color:var(--primary)" id="channelCount">-</div>
            </div>
            <div class="stat-card" style="border-left:4px solid var(--success)">
                <div class="label">项目数</div>
                <div class="value" style="color:var(--success)" id="projectCount">-</div>
            </div>
            <div class="stat-card" style="border-left:4px solid var(--warning)">
                <div class="label">卡密总数</div>
                <div class="value" style="color:var(--warning)" id="cardCount">-</div>
            </div>
            <div class="stat-card" style="border-left:4px solid var(--primary-light)">
                <div class="label">收码次数</div>
                <div class="value" style="color:var(--primary-light)" id="sessionCount">-</div>
            </div>
        </div>

        <hr style="border:none;border-top:1px solid var(--border);margin:32px 0">

        <!-- 一键部署 -->
        <h3>🚀 从 GitHub 部署</h3>
        <p style="color:var(--text-muted);margin-bottom:16px">在 GitHub 上改完代码后，点击下面按钮自动拉取到服务器并重启</p>
        <div style="display:flex;gap:12px;align-items:center">
            <button onclick="deploy()" style="padding:10px 28px;background:var(--primary);color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer">部署</button>
            <span id="deployStatus" style="font-size:0.85rem;color:var(--text-muted)"></span>
        </div>
        <pre id="deployOutput" style="background:#0f172a;color:#e2e8f0;padding:16px;border-radius:8px;margin-top:12px;font-size:0.8rem;max-height:300px;overflow-y:auto;display:none;white-space:pre-wrap"></pre>

        {% endblock %}
    </div>
</div>

<script>
async function loadStats() {
    const r = await fetch('/admin/stats?json=1');
    try {
        const d = await r.json();
        if (d.channelCount !== undefined) {
            document.getElementById('channelCount').textContent = d.channelCount;
            document.getElementById('projectCount').textContent = d.projectCount;
            document.getElementById('cardCount').textContent = d.cardCount;
            document.getElementById('sessionCount').textContent = d.sessionCount;
        }
    } catch(e) {}
}

async function deploy() {
    const btn = document.querySelector('button[onclick="deploy()"]');
    const status = document.getElementById('deployStatus');
    const output = document.getElementById('deployOutput');
    btn.disabled = true;
    btn.textContent = '部署中...';
    status.textContent = '⏳ 正在拉取最新代码...';
    output.style.display = 'block';
    try {
        const r = await fetch('/__deploy__');
        const text = await r.text();
        output.textContent = text;
        status.textContent = '✅ 部署完成！正在重启...';
        await fetch('/__restart__');
    } catch(e) {
        status.textContent = '❌ ' + e;
    }
    setTimeout(() => {
        btn.disabled = false;
        btn.textContent = '部署';
        status.textContent = '✅ 请刷新页面确认效果'; 
    }, 5000);
}

loadStats();
</script>
</body>
</html>
