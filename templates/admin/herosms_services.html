<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeroSMS 服务列表 - 云枢智联</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#f1f5f9; color:#1e293b; padding:20px; }
.container { max-width:1200px; margin:0 auto; }
h1 { font-size:1.5rem; margin-bottom:16px; color:#0f172a; }
.back-link { color:#6366f1; text-decoration:none; font-size:0.9rem; margin-bottom:16px; display:inline-block; }
.back-link:hover { text-decoration:underline; }
.search-box { background:#fff; padding:16px; border-radius:10px; box-shadow:0 1px 3px rgba(0,0,0,.08); margin-bottom:16px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.search-box label { font-size:0.9rem; font-weight:600; white-space:nowrap; }
.search-box input[type=text] { flex:1; min-width:200px; padding:8px 14px; border:1px solid #e2e8f0; border-radius:8px; font-size:0.9rem; outline:none; }
.search-box input[type=text]:focus { border-color:#6366f1; }
.search-box select { padding:8px 14px; border:1px solid #e2e8f0; border-radius:8px; font-size:0.9rem; outline:none; }
.search-box button { background:#6366f1; color:#fff; border:none; padding:8px 20px; border-radius:8px; font-size:0.9rem; cursor:pointer; }
.search-box button:hover { background:#4f46e5; }
.count { font-size:0.85rem; color:#64748b; margin-bottom:12px; }
table { width:100%; border-collapse:collapse; background:#fff; border-radius:10px; overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.08); }
th { background:#f8fafc; text-align:left; padding:12px 14px; font-size:0.8rem; font-weight:600; text-transform:uppercase; color:#64748b; border-bottom:1px solid #e2e8f0; }
td { padding:10px 14px; border-bottom:1px solid #f1f5f9; font-size:0.9rem; }
tr:hover { background:#f8fafc; }
.sid-code { font-family:'SF Mono','Menlo',monospace; color:#6366f1; font-weight:600; }
.price { font-weight:600; color:#059669; }
.stock { color:#64748b; }
.copy-btn { background:#eef2ff; color:#6366f1; border:none; padding:2px 10px; border-radius:4px; font-size:0.75rem; cursor:pointer; margin-left:6px; }
.copy-btn:hover { background:#e0e7ff; }
.error { background:#fef2f2; color:#dc2626; padding:12px 16px; border-radius:8px; margin-bottom:16px; font-size:0.9rem; }
.loading { text-align:center; padding:40px; color:#64748b; }
@media(max-width:640px) {
  .search-box { flex-direction:column; align-items:stretch; }
  .search-box label { white-space:normal; }
}
</style>
</head>
<body>
<div class="container">
<h1>🔍 HeroSMS 服务查询</h1>
<a href="/admin" class="back-link">&larr; 返回后台</a>

<div class="search-box">
  <label>国家：</label>
  <select name="country" onchange="this.form.submit()" id="countrySelect">
    <option value="16" {% if country=='16' %}selected{% endif %}>16 - 英格兰 (UK)</option>
    <option value="22" {% if country=='22' %}selected{% endif %}>22 - 美国 (USA)</option>
    <option value="7" {% if country=='7' %}selected{% endif %}>7 - 俄罗斯</option>
    <option value="44" {% if country=='44' %}selected{% endif %}>44 - 立陶宛</option>
    <option value="48" {% if country=='48' %}selected{% endif %}>48 - 荷兰</option>
    <option value="1" {% if country=='1' %}selected{% endif %}>1 - 印度</option>
  </select>
  <form method="GET" style="display:flex;gap:10px;flex:1;align-items:center" id="searchForm">
    <input type="hidden" name="country" id="hiddenCountry" value="{{ country }}">
    <input type="text" name="search" placeholder="按服务ID或名称搜索…" value="{{ search }}">
    <button type="submit">查询</button>
  </form>
</div>

{% if error %}
<div class="error">{{ error }}</div>
{% endif %}

{% if services %}
<div class="count">共 {{ services|length }} 个服务</div>
<table>
<thead>
<tr>
  <th style="width:120px">SID (项目ID)</th>
  <th>名称</th>
  <th style="width:100px">价格 ($)</th>
  <th style="width:100px">库存</th>
</tr>
</thead>
<tbody>
{% for s in services %}
<tr>
  <td><span class="sid-code">{{ s.sid }}</span><button class="copy-btn" onclick="navigator.clipboard.writeText('{{ s.sid }}')">复制</button></td>
  <td>{{ s.name }}</td>
  <td class="price">{{ s.price }}</td>
  <td class="stock">{{ s.stock }}</td>
</tr>
{% endfor %}
</tbody>
</table>
{% elif not error %}
<div class="loading">暂无数据</div>
{% endif %}
</div>

<script>
// Sync country select with hidden input
document.getElementById('countrySelect').addEventListener('change', function() {
  document.getElementById('hiddenCountry').value = this.value;
  document.getElementById('searchForm').submit();
});
</script>
</body>
</html>
