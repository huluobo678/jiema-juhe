<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}管理后台{% endblock %} - 云枢智联</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        * { box-sizing: border-box; }
        body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background:#f8fafc; }

        /* ===== 顶部导航栏 ===== */
        .top-bar {
            position: fixed; top:0; left:0; right:0; z-index:100;
            height: 56px; background:#fff; border-bottom:1px solid #e2e8f0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
        }
        .top-bar .top-left { display:flex; align-items:center; gap:12px; }
        .top-bar .hamburger {
            display:flex; align-items:center; justify-content:center;
            width:36px; height:36px; border-radius:8px; border:1px solid #e2e8f0;
            background:#fff; cursor:pointer; color:#475569; font-size:1.3rem; line-height:1;
        }
        .top-bar .top-logo {
            font-size:1.05rem; font-weight:700; color:#0f172a;
            background:linear-gradient(135deg,#0f172a,#334155); -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }
        .top-bar .top-right { display:flex; align-items:center; gap:16px; }

        /* ===== 主体布局 ===== */
        .body-layout { display:flex; margin-top:56px; min-height:calc(100vh - 56px); }

        /* ===== 侧边栏 ===== */
        .sidebar {
            width:220px; flex-shrink:0;
            background:#1e293b; color:rgba(255,255,255,0.7);
            padding:8px 0; overflow-y:auto;
            position:sticky; top:56px; height:calc(100vh - 56px);
        }
        .sidebar .sidebar-header {
            padding:16px 18px; border-bottom:1px solid rgba(255,255,255,0.1);
            font-size:1rem; font-weight:700; color:white;
        }
        .sidebar a {
            display:flex; align-items:center; gap:10px;
            padding:11px 18px; color:rgba(255,255,255,0.6);
            font-size:0.9rem; text-decoration:none; transition:all 0.15s;
        }
        .sidebar a:hover { background:rgba(255,255,255,0.06); color:white; }
        .sidebar a.active { background:rgba(79,70,229,0.25); color:white; font-weight:600; border-left:3px solid #4f46e5; }
        .sidebar a.active svg { color:#818cf8; }
        .sidebar a svg { width:17px; height:17px; flex-shrink:0; color:rgba(255,255,255,0.4); }
        .sidebar a.active svg { color:#818cf8; }
        .sidebar hr { border:none; border-top:1px solid rgba(255,255,255,0.1); margin:8px 18px; }
        .sidebar .text-danger { color:#ef4444 !important; }

        /* ===== 内容区 ===== */
        .content {
            flex:1; padding:24px 28px; min-height:calc(100vh - 56px);
            max-width:1200px;
        }
        .content .page-header { margin-bottom:20px; }
        .content .page-header h2 { font-size:1.3rem; font-weight:700; color:#0f172a; margin:0 0 2px; }
        .content .page-header p { font-size:0.82rem; color:#94a3b8; margin:0; }

        /* ===== 移动端遮罩 ===== */
        .sidebar-overlay { display:none; }

        @media (max-width: 768px) {
            .top-bar { padding:0 12px; }
            .sidebar-overlay {
                display:none; position:fixed; inset:0; z-index:50;
                background:rgba(0,0,0,0.4);
            }
            .sidebar-overlay.open { display:block; }
            .sidebar {
                position:fixed; top:56px; left:-240px; width:220px; z-index:60;
                height:calc(100vh - 56px); transition:left 0.25s ease;
                box-shadow:2px 0 12px rgba(0,0,0,0.1);
            }
            .sidebar.open { left:0; }
            .content { padding:16px; width:100%; }
        }
        @media (min-width: 769px) {
            .top-bar .hamburger { display:none; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
<div class="app-layout">
    <!-- 顶部导航栏 -->
    <div class="top-bar">
        <div class="top-left">
            <div class="hamburger" onclick="toggleMobileNav()">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
            </div>
            <span class="top-logo">云枢智联 · 管理后台</span>
        </div>
        <div class="top-right">
            <span style="font-size:0.85rem;color:#94a3b8;">{{ session.get('admin_username','') }}</span>
        </div>
    </div>

    <!-- 遮罩（移动端） -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileNav()"></div>

    <!-- 主体 -->
    <div class="body-layout">
        <div class="sidebar" id="mainNav">
            {% block sidebar %}{% include 'admin/_sidebar.html' %}{% endblock %}
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
    </div>
</div>

<script>
function toggleMobileNav() {
    document.getElementById('mainNav').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('open');
}
// 高亮当前菜单
document.addEventListener('DOMContentLoaded', function() {
    var path = window.location.pathname;
    document.querySelectorAll('.sidebar a').forEach(function(a) {
        var href = a.getAttribute('href');
        if (href && (path===href || path.startsWith(href+'/') || (path.includes('/admin/') && path!=='/admin/' && href!=='/admin/' && path.indexOf(href)===0))) {
            a.classList.add('active');
        }
        if (href === '/admin/' && path === '/admin/') {
            a.classList.add('active');
        }
    });
});
</script>
{% block scripts %}{% endblock %}
</body>
</html>
