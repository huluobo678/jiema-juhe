<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 登录</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="bg-gradient">
    <div class="redeem-container" style="max-width:400px">
        <div class="redeem-card">
            <div class="logo" style="text-align:center;margin-bottom:24px">🔐 管理后台</div>

            {% if error %}
            <div class="alert-modern error" style="margin-bottom:16px">{{ error }}</div>
            {% endif %}

            <form method="post">
                <div class="mb-3">
                    <input type="text" name="username" class="input-modern" placeholder="用户名" required>
                </div>
                <div class="mb-3">
                    <input type="password" name="password" class="input-modern" placeholder="密码" required>
                </div>
                <button class="btn-modern btn-primary-modern w-100">登录</button>
            </form>
        </div>
    </div>
</div>
<style>.w-100{width:100%}.mb-3{margin-bottom:16px}</style>
</body>
</html>
