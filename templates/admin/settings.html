<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="admin-layout">
    <div class="sidebar">{% include 'admin/_sidebar.html' %}</div>
    <div class="main-content">
        <h3>设置</h3>
        <p style="color:var(--text-muted);margin-bottom:16px">修改管理员密码</p>

        <div class="card-generator" style="max-width:480px">
            <h5 style="margin-bottom:16px">🔑 修改密码</h5>
            <form id="passwordForm">
                <div class="mb-3">
                    <label style="font-weight:600;margin-bottom:4px;display:block">新密码</label>
                    <input type="password" name="new_password" class="input-modern" required minlength="6" placeholder="至少6位">
                </div>
                <button class="btn-modern btn-primary-modern" onclick="return changePassword()">修改密码</button>
            </form>
        </div>
    </div>
</div>

<script>
async function changePassword() {
    const form = document.getElementById('passwordForm');
    const data = new FormData(form);
    const r = await fetch('/admin/settings', {method:'POST', body:data});
    const d = await r.json();
    alert(d.msg);
    if (d.ok) form.reset();
    return false;
}
</script>
<style>.mb-3{margin-bottom:16px}</style>
</body>
</html>
