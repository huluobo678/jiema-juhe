<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>接码平台</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div style="background:linear-gradient(135deg, #0f172a 0%, #1e293b 100%);min-height:100vh;padding:20px">
    <div style="max-width:520px;width:100%;margin:0 auto">
        <!-- 兑换区 -->
        <div id="stepRedeem" style="background:white;border-radius:12px;padding:28px 24px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.25)">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
                <div style="font-size:1.3rem;font-weight:700;color:#1e293b">📱 接码平台</div>
                <div style="display:flex;align-items:center;gap:8px">
                    <a href="/user/announcements" style="font-size:0.8rem;color:#4f46e5;text-decoration:none;padding:4px 10px;border:1px solid #4f46e5;border-radius:16px">📢 公告</a>
                    <span style="display:inline-flex;align-items:center;gap:6px;background:#f0fdf4;color:#16a34a;padding:6px 14px;border-radius:20px;font-weight:600;font-size:0.9rem" id="balanceBadge">
                        💰 <span id="balanceDisplay">0</span> 元
                    </span>
                </div>
            </div>

            <div id="redeemResult" class="d-none" style="padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:0.9rem"></div>

            <div style="display:flex;gap:8px;margin-bottom:16px">
                <input type="text" id="codeInput" placeholder="输入卡密兑换" style="flex:1;padding:10px 14px;border:2px solid #e2e8f0;border-radius:8px;font-size:0.95rem;outline:none;color:#1e293b" onfocus="this.style.borderColor='#4f46e5'" onblur="this.style.borderColor='#e2e8f0'">
                <button onclick="redeem()" style="padding:10px 20px;background:#4f46e5;color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer;white-space:nowrap">兑换</button>
            </div>

            <!-- 推荐人提示 -->
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
                <input type="text" id="referrerInput" placeholder="推荐人Token（选填）" style="flex:1;padding:8px 12px;border:2px solid #e2e8f0;border-radius:8px;font-size:0.85rem;outline:none;color:#1e293b">
                <span style="font-size:0.75rem;color:#94a3b8">🎁 返利5%</span>
            </div>
            <!-- 项目选择区 -->
            <div style="margin-top:4px">
                <div style="font-size:0.9rem;color:#64748b;margin-bottom:10px">选择项目开始收码</div>
                {% for p in projects %}
                <div onclick="startOrder({{ p.id }}, '{{ p.name }}')" 
                     style="background:white;border:2px solid #e2e8f0;border-radius:10px;padding:14px 18px;cursor:pointer;transition:all 0.2s;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"
                     onmouseover="this.style.borderColor='#4f46e5';this.style.transform='translateX(3px)';this.style.boxShadow='0 2px 8px rgba(79,70,229,0.12)'"
                     onmouseout="this.style.borderColor='#e2e8f0';this.style.transform='none';this.style.boxShadow='none'">
                    <div style="display:flex;align-items:center;gap:8px">
                        <span style="font-size:1.2rem">📦</span>
                        <span style="font-weight:600;font-size:1rem;color:#1e293b">{{ p.name }}</span>
                    </div>
                    <div style="background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;padding:5px 14px;border-radius:20px;font-weight:700;font-size:0.95rem">{{ p.price }} 元</div>
                </div>
                {% endfor %}
            </div>
        </div>

        <!-- 收码区 -->
        <div id="stepSMS" class="d-none" style="background:rgba(255,255,255,0.06);backdrop-filter:blur(12px);border-radius:12px;padding:32px 24px;text-align:center;border:1px solid rgba(255,255,255,0.1);box-shadow:0 25px 50px -12px rgba(0,0,0,0.3)">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
                <span style="color:#93c5fd;font-size:1.1rem;font-weight:600" id="projectName">腾讯元宝</span>
                <span style="display:inline-flex;align-items:center;gap:6px;background:rgba(34,197,94,0.12);color:#4ade80;padding:4px 12px;border-radius:20px;font-weight:600;font-size:0.85rem">💰 <span id="balanceDisplay2">0</span> 元</span>
            </div>

            <div style="margin-bottom:16px">
                <div style="color:#94a3b8;font-size:0.85rem;margin-bottom:4px">当前号码</div>
                <div style="color:#f1f5f9;font-size:1.8rem;font-weight:700;font-family:'Courier New',monospace;letter-spacing:2px" id="phoneDisplay">---</div>
            </div>

            <div style="margin-bottom:20px">
                <span style="color:#e2e8f0;font-size:1.2rem;font-weight:600">⏱ <span id="countdown">200</span>秒</span>
            </div>

            <div id="waitingArea">
                <div style="display:inline-block;width:44px;height:44px;border:3px solid rgba(255,255,255,0.1);border-top-color:#818cf8;border-radius:50%;animation:spin 1s linear infinite"></div>
                <div style="color:#e2e8f0;font-size:1.05rem;margin-top:14px">等待验证码中...</div>
                <div style="color:#64748b;font-size:0.8rem;margin-top:4px">自动轮询，收到即止</div>
            </div>

            <div id="codeArea" class="d-none">
                <div style="color:#94a3b8;font-size:0.85rem;margin-bottom:8px">验证码</div>
                <div style="font-size:3rem;font-weight:800;color:#22c55e;letter-spacing:8px;font-family:'Courier New',monospace;text-shadow:0 0 30px rgba(34,197,94,0.3);animation:codePulse 2s ease-in-out" id="codeDisplay">---</div>
                <div style="background:rgba(255,255,255,0.08);border-radius:8px;padding:12px;margin-top:14px;color:#e2e8f0;font-size:0.85rem;text-align:left;line-height:1.5" id="smsDisplay"></div>
            </div>

            <div id="timeoutArea" class="d-none">
                <div style="color:#94a3b8;font-size:0.95rem;margin-bottom:10px">⏰ 超时未收到</div>
                <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
                    <button class="btn-sm" style="background:rgba(239,68,68,0.2);color:#fca5a5;border:1px solid rgba(239,68,68,0.3)" onclick="releasePhone()">释放号码</button>
                    <button class="btn-sm" style="background:#4f46e5;color:white;border:none" onclick="backToHome()">重新选择</button>
                </div>
            </div>

            <div id="errorArea" class="d-none" style="padding:12px;color:#fca5a5;font-size:0.85rem;border:1px solid rgba(239,68,68,0.3);border-radius:8px"></div>

            <div style="margin-top:16px;display:flex;gap:10px;justify-content:center">
                <button id="releaseBtn" style="padding:8px 18px;font-size:0.85rem;background:rgba(239,68,68,0.15);color:#fca5a5;border:1px solid rgba(239,68,68,0.3);border-radius:20px;cursor:pointer" onclick="releasePhone()">释放号码</button>
                <button style="padding:8px 18px;font-size:0.85rem;background:rgba(255,255,255,0.1);color:#e2e8f0;border:1px solid rgba(255,255,255,0.2);border-radius:20px;cursor:pointer" onclick="backToHome()">← 返回</button>
            </div>
        </div>
    </div>
</div>
<div style="margin-top:16px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
    <a href="/register" style="font-size:0.8rem;color:#64748b;text-decoration:none">📧 绑定邮箱</a>
    <a href="https://qian.s888w.com" target="_blank" style="font-size:0.8rem;color:#64748b;text-decoration:none">🌍 海外号批发</a>
    <a href="/user/announcements" style="font-size:0.8rem;color:#64748b;text-decoration:none">📢 公告</a>
</div>

<script>
let currentViewToken = null;
let polling = false;
let secondsLeft = 200;
let countdownTimer = null;

// 余额
async function loadBalance() {
    try {
        const r = await fetch('/balance');
        const d = await r.json();
        const bal = d.balance || 0;
        document.getElementById('balanceDisplay').textContent = bal;
        if (document.getElementById('balanceDisplay2')) document.getElementById('balanceDisplay2').textContent = bal;
    } catch(e) {}
}

// 兑换
async function redeem() {
    const code = document.getElementById('codeInput').value.trim();
    if (!code) return alert('请输入卡密');
    const ref = document.getElementById('referrerInput')?.value?.trim() || '';
    let body = 'code='+encodeURIComponent(code);
    if (ref) body += '&referred_by=' + encodeURIComponent(ref);
    const r = await fetch('/redeem', {method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: body});
    const d = await r.json();
    const el = document.getElementById('redeemResult');
    el.classList.remove('d-none');
    el.style.background = d.ok ? '#f0fdf4' : '#fef2f2';
    el.style.color = d.ok ? '#166534' : '#991b1b';
    el.style.border = d.ok ? '1px solid #bbf7d0' : '1px solid #fecaca';
    el.textContent = d.msg;
    if (d.account_token) { document.cookie = 'account_token='+d.account_token+';max-age=2592000;path=/'; }
    if (d.ok) document.getElementById('codeInput').value = '';
    loadBalance();
}

// 收码
async function startOrder(projectId, projectName) {
    const r = await fetch('/start-order', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({project_id: projectId})
    });
    const d = await r.json();
    if (!d.ok) { alert('❌ ' + d.msg); return; }

    // 项目名从点击获取

    document.getElementById('stepRedeem').classList.add('d-none');
    document.getElementById('stepSMS').classList.remove('d-none');
    document.getElementById('projectName').textContent = projectName;
    document.getElementById('phoneDisplay').textContent = d.phone;
    document.getElementById('waitingArea').classList.remove('d-none');
    document.getElementById('codeArea').classList.add('d-none');
    document.getElementById('timeoutArea').classList.add('d-none');
    document.getElementById('errorArea').classList.add('d-none');
    document.getElementById('releaseBtn').textContent = '释放号码';
    document.getElementById('releaseBtn').disabled = false;
    document.getElementById('releaseBtn').style.opacity = '1';
    document.getElementById('releaseBtn').style.cursor = 'pointer';

    currentViewToken = d.view_token;
    secondsLeft = 200;
    document.getElementById('countdown').textContent = secondsLeft;
    polling = true;

    if (countdownTimer) clearInterval(countdownTimer);
    countdownTimer = setInterval(updateTimer, 1000);
    pollSMS();
    loadBalance();
}

function updateTimer() {
    document.getElementById('countdown').textContent = secondsLeft;
    if (secondsLeft <= 0) {
        polling = false;
        if (countdownTimer) clearInterval(countdownTimer);
        document.getElementById('waitingArea').classList.add('d-none');
        document.getElementById('timeoutArea').classList.remove('d-none');
        return;
    }
    secondsLeft--;
}

async function pollSMS() {
    if (!polling || !currentViewToken) return;
    try {
        const r = await fetch('/api/sms/' + currentViewToken);
        const d = await r.json();
        if (d.ok && d.code) {
            polling = false;
            if (countdownTimer) clearInterval(countdownTimer);
            document.getElementById('waitingArea').classList.add('d-none');
            document.getElementById('codeArea').classList.remove('d-none');
            document.getElementById('codeDisplay').textContent = d.code;
            document.getElementById('smsDisplay').textContent = d.sms || '(无短信内容)';
            document.getElementById('releaseBtn').textContent = '✅ 已收到';
            document.getElementById('releaseBtn').disabled = true;
            document.getElementById('releaseBtn').style.opacity = '0.5';
            document.getElementById('releaseBtn').style.cursor = 'default';
            loadBalance();
            return;
        }
        if (d.msg && (d.msg.includes('余额不足') || d.msg.includes('失败'))) {
            polling = false;
            if (countdownTimer) clearInterval(countdownTimer);
            document.getElementById('waitingArea').classList.add('d-none');
            document.getElementById('errorArea').classList.remove('d-none');
            document.getElementById('errorArea').textContent = '❌ ' + d.msg;
            return;
        }
    } catch(e) {}
    setTimeout(pollSMS, 3000);
}

async function releasePhone() {
    if (!currentViewToken) return;
    if (!confirm('确定释放该号码？')) return;
    const r = await fetch('/release-phone', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({view_token: currentViewToken})
    });
    const d = await r.json();
    if (d.ok) {
        polling = false;
        if (countdownTimer) clearInterval(countdownTimer);
        document.getElementById('releaseBtn').textContent = '✅ 已释放';
        document.getElementById('releaseBtn').disabled = true;
        document.getElementById('releaseBtn').style.opacity = '0.5';
        document.getElementById('releaseBtn').style.cursor = 'default';
        document.getElementById('waitingArea').classList.add('d-none');
        document.getElementById('errorArea').classList.remove('d-none');
        document.getElementById('errorArea').textContent = '⏹ 号码已释放';
        loadBalance();
    }
}

function backToHome() {
    polling = false;
    if (countdownTimer) clearInterval(countdownTimer);
    currentViewToken = null;
    document.getElementById('stepSMS').classList.add('d-none');
    document.getElementById('stepRedeem').classList.remove('d-none');
    loadBalance();
}

loadBalance();
</script>
<style>.d-none{display:none}.btn-sm{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;font-size:0.9rem;border-radius:8px;font-weight:600;cursor:pointer;text-decoration:none}@keyframes spin{to{transform:rotate(360deg)}}@keyframes codePulse{0%{opacity:0;transform:scale(0.5)}50%{opacity:1;transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}</style>
</body>
</html>
