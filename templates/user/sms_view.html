<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>验证码查看</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="sms-bg">
    <div class="sms-card">
        <div style="margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
            <span style="color:#93c5fd;font-size:1rem;font-weight:600">{{ session.project_name }}</span>
            <button id="releaseBtn" style="padding:6px 16px;font-size:0.85rem;background:rgba(239,68,68,0.2);color:#fca5a5;border:1px solid rgba(239,68,68,0.4);border-radius:20px;cursor:pointer" onclick="releasePhone()">释放号码</button>
        </div>

        <div style="margin-bottom:24px;text-align:center">
            <div style="color:#94a3b8;font-size:0.9rem;margin-bottom:6px">当前号码</div>
            <div style="color:#f1f5f9;font-size:2rem;font-weight:700;font-family:'Courier New',monospace;letter-spacing:2px">{{ session.phone }}</div>
        </div>

        <div style="text-align:center;margin-bottom:24px">
            <span style="color:#e2e8f0;font-size:1.3rem;font-weight:600">⏱ <span id="countdown">200</span>秒</span>
        </div>

        <div id="waiting" style="text-align:center;padding:40px 0">
            <div style="display:inline-block;width:60px;height:60px;border:4px solid rgba(255,255,255,0.1);border-top-color:#818cf8;border-radius:50%;animation:spin 1s linear infinite"></div>
            <div style="color:#e2e8f0;font-size:1.2rem;margin-top:20px">等待验证码中...</div>
            <div style="color:#64748b;font-size:0.9rem;margin-top:8px">页面自动轮询，收到后自动停止</div>
        </div>

        <div id="result" class="d-none" style="text-align:center">
            <div style="color:#94a3b8;font-size:0.95rem;margin-bottom:12px">验证码</div>
            <div style="font-size:4rem;font-weight:800;color:#22c55e;letter-spacing:8px;font-family:'Courier New',monospace;text-shadow:0 0 40px rgba(34,197,94,0.3);animation:codePulse 2s ease-in-out" id="codeDisplay">---</div>
            <div style="background:rgba(255,255,255,0.1);border-radius:8px;padding:16px;margin-top:20px;color:#e2e8f0;font-size:0.95rem;text-align:left;line-height:1.6" id="smsDisplay"></div>
            <button class="btn-modern" style="margin-top:20px;padding:10px 28px;font-size:1rem;background:#4f46e5;color:white;border:none;border-radius:8px;cursor:pointer" onclick="releasePhone()">释放号码</button>
        </div>

        <div id="error" class="d-none" style="padding:16px;color:#fca5a5;font-size:0.95rem;border:1px solid rgba(239,68,68,0.3);border-radius:8px;text-align:center"></div>

        <div id="timeout" class="d-none" style="text-align:center;padding:24px">
            <div style="color:#94a3b8;font-size:1rem;margin-bottom:16px">⏰ 超时未收到验证码</div>
            <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
                <button class="btn-modern" style="padding:10px 24px;font-size:0.95rem;background:rgba(239,68,68,0.2);color:#fca5a5;border:1px solid rgba(239,68,68,0.4);border-radius:8px;cursor:pointer" onclick="releasePhone()">释放号码</button>
                <a href="/projects" style="padding:10px 24px;font-size:0.95rem;background:#4f46e5;color:white;border:none;border-radius:8px;cursor:pointer;text-decoration:none;display:inline-block">重新选择项目</a>
            </div>
        </div>

        {% if session.status == 'received' %}
        <script>
            document.getElementById('waiting').classList.add('d-none');
            document.getElementById('result').classList.remove('d-none');
            document.getElementById('codeDisplay').textContent = '{{ session.code }}';
            document.getElementById('smsDisplay').textContent = '{{ session.sms_content or "(无短信内容)" }}';
        </script>
        {% endif %}
    </div>
</div>

<script>
const viewToken = '{{ session.view_token }}';
let polling = true;
let secondsLeft = 200;

function updateTimer() {
    document.getElementById('countdown').textContent = secondsLeft;
    if (secondsLeft <= 0) {
        polling = false;
        document.getElementById('waiting').classList.add('d-none');
        document.getElementById('timeout').classList.remove('d-none');
        return;
    }
    secondsLeft--;
}

async function poll() {
    if (!polling) return;
    try {
        const r = await fetch('/api/sms/' + viewToken);
        const d = await r.json();
        if (d.ok && d.code !== undefined && d.code !== null) {
            document.getElementById('waiting').classList.add('d-none');
            document.getElementById('result').classList.remove('d-none');
            document.getElementById('codeDisplay').textContent = d.code;
            document.getElementById('smsDisplay').textContent = d.sms || '(无短信内容)';
            polling = false;
            document.getElementById('releaseBtn').textContent = '✅ 已收到';
            document.getElementById('releaseBtn').style.opacity = '0.5';
            document.getElementById('releaseBtn').disabled = true;
            return;
        }
        if (d.msg && (d.msg.includes('余额不足') || d.msg.includes('失败'))) {
            document.getElementById('waiting').classList.add('d-none');
            document.getElementById('error').classList.remove('d-none');
            document.getElementById('error').textContent = '❌ ' + d.msg;
            polling = false;
            return;
        }
    } catch(e) {}
    setTimeout(poll, 3000);
}
async function releasePhone() {
    if (!confirm('确定释放该号码？')) return;
    const r = await fetch('/release-phone', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({view_token: viewToken})
    });
    const d = await r.json();
    if (d.ok) {
        document.getElementById('releaseBtn').textContent = '✅ 已释放';
        document.getElementById('releaseBtn').disabled = true;
        document.getElementById('releaseBtn').style.opacity = '0.5';
        if (polling) {
            polling = false;
            document.getElementById('waiting').classList.add('d-none');
            document.getElementById('error').classList.remove('d-none');
            document.getElementById('error').textContent = '⏹ 号码已释放';
        }
    }
}

setInterval(updateTimer, 1000);
updateTimer();

{% if session.status == 'waiting' %}
poll();
{% endif %}
</script>
<style>.d-none{display:none}@keyframes spin{to{transform:rotate(360deg)}}@keyframes codePulse{0%{opacity:0;transform:scale(0.5)}50%{opacity:1;transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}</style>
</body>
</html>
